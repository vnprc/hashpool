# Stratum V2 Template Provider configuration
# This file is placed in the Bitcoin datadir and read by sv2-tp on startup.
# The chain is passed as a command-line argument by devenv.nix.

# sv2bind sets the bind address. sv2port sets the listen port but network
# defaults take precedence when -chain= is specified (regtest: 18447).
# pool/jdc configs use tp_address = "127.0.0.1:18447" accordingly.
sv2bind=127.0.0.1

# IPC: connect to bitcoin-node via unix socket (auto-discovered from datadir)
ipcconnect=unix

# Logging
debug=sv2
loglevel=sv2:trace
