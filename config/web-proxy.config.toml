# Web-Proxy Configuration
# Queries Prometheus/VictoriaMetrics via HTTP, serves to browser
# Query intervals come from config/shared/miner.toml [web_proxy]

[server]
# HTTP server: where browser and other clients fetch dashboard
listen_address = "127.0.0.1:3030"

[metrics_store]
# HTTP endpoint for Prometheus/VictoriaMetrics API
url = "http://127.0.0.1:9091"

[http_client]
# HTTP client settings for metrics queries
pool_idle_timeout_secs = 300
request_timeout_secs = 60
