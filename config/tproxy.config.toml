# Local Mining Device Downstream Connection
# Dev - use your local network IP or 0.0.0.0 to listen on all interfaces
downstream_address = "0.0.0.0"
downstream_port = 34255
# Prod - VPS external IP
# downstream_address = "188.40.233.11"
# downstream_port = 34256

# Version support
max_supported_version = 2
min_supported_version = 2

# Minimum extranonce2 size for downstream
# Max value: 16 (leaves 0 bytes for search space splitting of downstreams)
# Max value for CGminer: 8
# Min value: 2
downstream_extranonce2_size = 8

# User identity for upstream connection
user_identity = "hashpool"

# Aggregate all downstream miners into single upstream channel
aggregate_channels = false

# Monitoring HTTP endpoint for Prometheus/VictoriaMetrics scraping
monitoring_address = "127.0.0.1:9109"

# Pool monitoring URL for fetching Bitcoin network name (exposed via GET /api/v1/global)
pool_monitoring_url = "http://127.0.0.1:9108"

# Redact miner IP addresses from database and website
redact_ip = false

# Faucet configuration
faucet_port = 8083
faucet_timeout = 3

# Miner hashrate metrics window (seconds)
metrics_window_secs = 60


# List of upstream pool servers (with fallback support)
[[upstreams]]
# Local SRI JDC Upstream Connection
address = "127.0.0.1"
port = 34254
authority_pubkey = "9auqWEzQDVyd2oe1JVGFLMLHZtCo2FFqZwtKA5gd9xbuEu7PH72"

# Alternative upstream (commented out)
# [[upstreams]]
# Braiins Pool Upstream Connection
# address = "18.196.32.109"
# port = 3336
# authority_pubkey = "u95GEReVMjK6k5YqiSFNqqTnKU4ypU2Wm8awa6tmbmDmk1bWt"

# Difficulty params
[downstream_difficulty_config]
# minimum hashrate expected from an individual miner on the downstream connection (in Hz)
min_individual_miner_hashrate = 5.0
# target number of shares per minute the miner should be sending
# NOTE: When `enable_vardiff = false`, this only affects the initial
# `mining.set_difficulty` sent before the upstream `SetTarget` arrives.
# It is kept very high to make the initial target extremely easy so the
# upstream pool can take over difficulty immediately.
shares_per_minute = 12000000.0
# enable variable difficulty adjustment mechanism
# if false, difficulty will be managed by upstream (useful with JDC and self-hosted wallet proxy)
enable_vardiff = false
# interval in seconds between keepalive mining.notify messages sent to prevent SV1 miner timeouts
# set to 0 to disable
job_keepalive_interval_secs = 60

[upstream_difficulty_config]
# interval in seconds to elapse before updating channel hashrate with the pool
channel_diff_update_interval = 60
# estimated accumulated hashrate of all downstream miners (e.g.: 10 Th/s = 10_000_000_000_000.0)
channel_nominal_hashrate = 5.0

